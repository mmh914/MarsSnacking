<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Walmart LTO Barcode Archive</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header>
    <div class="top-row">
      <a class="splash-back-button" href="../index.html" aria-label="Back to splash page">Back</a>
      <h1>Limited Time Offer Barcode Archive</h1>
      <div class="brand-mark"><span class="k">Kellanova</span> | <span class="w">Walmart</span></div>
    </div>
    <div class="controls">
      <input id="search" type="search" placeholder="Search item name or UPC..." />
      <div id="count" class="count"></div>
    </div>
  </header>

  <main id="app"></main>
  <div id="barcodeModal" class="barcode-modal" hidden>
    <button class="modal-backdrop" type="button" aria-label="Close expanded barcode"></button>
    <article class="expanded-card" role="dialog" aria-modal="true" aria-labelledby="expandedName">
      <button id="closeModal" class="modal-close" type="button" aria-label="Close expanded barcode">X</button>
      <div id="expandedImage" class="expanded-image"></div>
      <p id="expandedName" class="expanded-name"></p>
      <div id="expandedBarcode" class="expanded-barcode"></div>
      <div id="expandedUpc" class="expanded-upc"></div>
    </article>
  </div>

  <script src="lto-barcode-items.js"></script>
  <script>
    const LEFT_GUARD = "101";
    const CENTER_GUARD = "01010";
    const RIGHT_GUARD = "101";

    const L_CODES = {
      "0": "0001101", "1": "0011001", "2": "0010011", "3": "0111101", "4": "0100011",
      "5": "0110001", "6": "0101111", "7": "0111011", "8": "0110111", "9": "0001011"
    };

    const R_CODES = {
      "0": "1110010", "1": "1100110", "2": "1101100", "3": "1000010", "4": "1011100",
      "5": "1001110", "6": "1010000", "7": "1000100", "8": "1001000", "9": "1110100"
    };

    function cleanUpc(upc) {
      return String(upc).replace(/\D/g, "");
    }

    function isValidUpcA(upc) {
      const digits = cleanUpc(upc);
      if (!/^\d{12}$/.test(digits)) return false;
      const body = digits.slice(0, 11).split("").map(Number);
      const check = Number(digits[11]);
      const sum = body.reduce((total, digit, index) => total + digit * (index % 2 === 0 ? 3 : 1), 0);
      return (10 - (sum % 10)) % 10 === check;
    }

    function upcToBits(upc) {
      const digits = cleanUpc(upc);
      if (!/^\d{12}$/.test(digits)) throw new Error(`UPC must be 12 digits: ${upc}`);
      const left = digits.slice(0, 6).split("").map(d => L_CODES[d]).join("");
      const right = digits.slice(6).split("").map(d => R_CODES[d]).join("");
      return LEFT_GUARD + left + CENTER_GUARD + right + RIGHT_GUARD;
    }

    function renderBarcodeSvg(upc) {
      const digits = cleanUpc(upc);
      const bits = upcToBits(digits);
      const moduleWidth = 2;
      const barHeight = 72;
      const guardHeight = 82;
      const quiet = 10;
      const width = bits.length * moduleWidth + quiet * 2;
      const height = 104;

      let rects = "";
      for (let i = 0; i < bits.length; i++) {
        if (bits[i] === "1") {
          const inGuard = i < 3 || (i >= 45 && i < 50) || i >= 92;
          rects += `<rect x="${quiet + i * moduleWidth}" y="0" width="${moduleWidth}" height="${inGuard ? guardHeight : barHeight}" />`;
        }
      }

      return `
        <svg class="barcode" viewBox="0 0 ${width} ${height}" role="img" aria-label="UPC ${digits}">
          <rect width="100%" height="100%" fill="white"></rect>
          <g fill="black">${rects}</g>
        </svg>
      `;
    }

    function formatUpc(upc) {
      const d = cleanUpc(upc);
      return d.length === 12 ? `${d[0]} ${d.slice(1,6)} ${d.slice(6,11)} ${d[11]}` : upc;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function cardTemplate(item, index) {
      const valid = isValidUpcA(item.upc);
      const barcode = /^\d{12}$/.test(cleanUpc(item.upc))
        ? renderBarcodeSvg(item.upc)
        : `<div class="missing-image">Invalid UPC</div>`;
      const safeName = escapeHtml(item.name);
      const safeImageSrc = escapeHtml(item.imageSrc || "");

      return `
        <article class="item-card archive-card" tabindex="0" role="button" data-item-index="${index}" aria-label="Expand barcode for ${safeName}">
          <div class="item-image-wrap">
            ${item.imageSrc
              ? `<img class="item-image" src="${safeImageSrc}" alt="${safeName}" onerror="this.replaceWith(Object.assign(document.createElement('div'), {className:'missing-image', textContent:'Image not found'}))">`
              : `<div class="missing-image">No image</div>`
            }
          </div>
          <p class="item-name">${safeName}</p>
          ${barcode}
          <div class="upc-text">${formatUpc(item.upc)}</div>
          <div class="meta">${valid ? "" : "Check digit warning"}</div>
        </article>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      const q = document.getElementById("search").value.trim().toLowerCase();
      const filtered = items
        .filter(item => {
          const haystack = `${item.name} ${cleanUpc(item.upc)} ${item.dateAdded}`.toLowerCase();
          return haystack.includes(q);
        })
        .sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded) || a.name.localeCompare(b.name));

      document.getElementById("count").textContent = `${filtered.length} item${filtered.length === 1 ? "" : "s"}`;

      if (!filtered.length) {
        app.innerHTML = `<div class="empty">No matching items.</div>`;
        return;
      }

      app.innerHTML = `
        <div class="grid">
          ${filtered.map((item, index) => cardTemplate(item, index)).join("")}
        </div>
      `;

      app.querySelectorAll(".archive-card").forEach(card => {
        card.addEventListener("click", () => openExpandedCard(filtered[Number(card.dataset.itemIndex)]));
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openExpandedCard(filtered[Number(card.dataset.itemIndex)]);
          }
        });
      });
    }

    function openExpandedCard(item) {
      const modal = document.getElementById("barcodeModal");
      const image = document.getElementById("expandedImage");
      const name = document.getElementById("expandedName");
      const barcode = document.getElementById("expandedBarcode");
      const upc = document.getElementById("expandedUpc");
      const safeName = escapeHtml(item.name);
      const safeImageSrc = escapeHtml(item.imageSrc || "");

      image.innerHTML = item.imageSrc
        ? `<img src="${safeImageSrc}" alt="${safeName}" onerror="this.replaceWith(Object.assign(document.createElement('div'), {className:'missing-image', textContent:'Image not found'}))">`
        : `<div class="missing-image">No image</div>`;
      name.textContent = item.name;
      barcode.innerHTML = /^\d{12}$/.test(cleanUpc(item.upc))
        ? renderBarcodeSvg(item.upc)
        : `<div class="missing-image">Invalid UPC</div>`;
      upc.textContent = formatUpc(item.upc);
      modal.hidden = false;
      document.body.classList.add("modal-open");
      document.getElementById("closeModal").focus();
    }

    function closeExpandedCard() {
      document.getElementById("barcodeModal").hidden = true;
      document.body.classList.remove("modal-open");
    }

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("closeModal").addEventListener("click", closeExpandedCard);
    document.querySelector(".modal-backdrop").addEventListener("click", closeExpandedCard);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !document.getElementById("barcodeModal").hidden) {
        closeExpandedCard();
      }
    });
    render();
  </script>
</body>
</html>
