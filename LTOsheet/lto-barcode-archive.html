<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Walmart LTO Barcode Archive</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header>
    <div class="top-row">
      <a class="splash-back-button" href="../index.html" aria-label="Back to splash page">Back</a>
      <h1>Limited Time Offer Barcode Archive</h1>
      <div class="brand-mark"><span class="k">Kellanova</span> | <span class="w">Walmart</span></div>
    </div>
    <div class="controls">
      <input id="search" type="search" placeholder="Search item name or UPC..." />
      <div id="count" class="count"></div>
    </div>
  </header>

  <main id="app"></main>
  <div id="barcodeModal" class="barcode-modal" hidden>
    <button class="modal-backdrop" type="button" aria-label="Close expanded barcode"></button>
    <article class="expanded-card" role="dialog" aria-modal="true" aria-labelledby="expandedName">
      <button id="closeModal" class="modal-close" type="button" aria-label="Close expanded barcode">X</button>
      <div id="expandedImage" class="expanded-image"></div>
      <p id="expandedName" class="expanded-name"></p>
      <div id="expandedBarcode" class="expanded-barcode"></div>
      <div id="expandedUpc" class="expanded-upc"></div>
    </article>
  </div>

  <script src="../shared/barcode-cards.js"></script>
  <script>
    const { cleanUpc, cardTemplate, bindArchiveCards, wireModal } = window.BarcodeCards;
    const app = document.getElementById("app");
    const count = document.getElementById("count");
    const search = document.getElementById("search");
    let items = [];

    function imagePathFromCatalog(imagePath) {
      if (!imagePath) return "";
      if (/^(?:[a-z]+:|\/)/i.test(imagePath)) return imagePath;
      return `../${imagePath}`;
    }

    function normalizeProduct(product) {
      const tags = Array.isArray(product.tags) ? product.tags.join(" ") : "";
      return {
        name: product.name,
        imageSrc: imagePathFromCatalog(product.image),
        upc: product.upc,
        brand: product.brand,
        lastUpdated: product.lastUpdated,
        searchText: `${product.name} ${product.brand} ${cleanUpc(product.upc)} ${product.lastUpdated} ${tags}`.toLowerCase(),
      };
    }

    function setMessage(message, countText = "") {
      count.textContent = countText;
      app.innerHTML = `<div class="empty">${message}</div>`;
    }

    function render() {
      const q = search.value.trim().toLowerCase();
      const filtered = items
        .filter((item) => item.searchText.includes(q))
        .sort((a, b) => Date.parse(b.lastUpdated) - Date.parse(a.lastUpdated) || a.name.localeCompare(b.name));

      count.textContent = `${filtered.length} item${filtered.length === 1 ? "" : "s"}`;

      if (!filtered.length) {
        app.innerHTML = `<div class="empty">No matching items.</div>`;
        return;
      }

      app.innerHTML = `
        <div class="grid">
          ${filtered.map((item, index) => cardTemplate(item, index)).join("")}
        </div>
      `;

      bindArchiveCards(app, filtered);
    }

    async function loadCatalog() {
      setMessage("Loading items...", "Loading");

      try {
        const response = await fetch("../product-catalog-data/product-catalog.json");
        if (!response.ok) throw new Error(`Catalog request failed with ${response.status}`);

        const catalog = await response.json();
        if (!catalog || !Array.isArray(catalog.products)) {
          throw new Error("Catalog products array is missing");
        }

        items = catalog.products
          .filter((product) => product.isLimitedTimeOffering === true)
          .map(normalizeProduct);

        render();
      } catch (error) {
        console.error(error);
        setMessage("Unable to load the product catalog.", "Catalog error");
      }
    }

    search.addEventListener("input", render);
    wireModal();
    loadCatalog();
  </script>
</body>
</html>
